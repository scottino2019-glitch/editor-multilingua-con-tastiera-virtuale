# File di configurazione di Netlify per l'Editor di Scrittura Multilingue

[build]
  publish = "dist"
  command = "vite build"

# Reindirizzamento delle API alla Serverless Function di Netlify
[[redirects]]
  from = "/api/proxy-image"
  to = "/.netlify/functions/proxy-image"
  status = 200
  force = true

[[redirects]]
  from = "/api/translate"
  to = "/.netlify/functions/translate"
  status = 200
  force = true

# Supporto alle rotte Single Page Application (SPA) di React
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
